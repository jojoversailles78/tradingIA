<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TradingIA - 6 Agents</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#0a0a0f;color:#e0e0e0;min-height:100vh}
.top{background:#111118;padding:12px 20px;display:flex;align-items:center;gap:16px;border-bottom:1px solid #222;flex-wrap:wrap}
.top b{font-size:18px;color:#fff}
.nav-link{color:#1D9E75;font-size:13px;text-decoration:none;padding:6px 12px;border-radius:8px;border:1px solid #1D9E75}
.content{padding:20px;max-width:1400px;margin:0 auto}
.card{background:#111118;border-radius:12px;padding:20px;border:1px solid #1e1e2e;margin-bottom:16px}
.stitle{font-size:11px;font-weight:600;color:#555;margin-bottom:14px;text-transform:uppercase;letter-spacing:0.08em}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.agent-card{background:#111118;border-radius:12px;padding:16px;border:1px solid #1e1e2e;cursor:pointer;transition:border-color 0.2s}
.agent-card:hover{border-color:#1D9E75}
.agent-card.selected{border-color:#1D9E75;background:#0d1a14}
.agent-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
.agent-name{font-size:15px;font-weight:600;color:#fff}
.agent-strategy{font-size:11px;color:#555;margin-top:2px}
.agent-score{font-size:28px;font-weight:600}
.metric-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #1a1a2e;font-size:12px}
.metric-row:last-child{border-bottom:none}
.label{color:#555}
.btn{padding:8px 16px;border-radius:8px;border:none;cursor:pointer;font-size:13px;font-weight:500}
.btn-green{background:#1D9E75;color:#fff}
.btn-red{background:#3a1a1a;color:#f87171;border:1px solid #f87171}
.btn-gray{background:#1a1a24;color:#aaa;border:1px solid #333}
.pos-row{display:grid;grid-template-columns:80px 1fr 90px 90px 90px 100px;gap:8px;align-items:center;padding:8px 12px;border-bottom:1px solid #1a1a2e;font-size:12px}
.pos-header{display:grid;grid-template-columns:80px 1fr 90px 90px 90px 100px;gap:8px;padding:6px 12px;font-size:11px;color:#555;border-bottom:1px solid #222}
.hist-row{display:grid;grid-template-columns:90px 70px 1fr 90px 110px;gap:8px;align-items:center;padding:8px 12px;border-bottom:1px solid #1a1a2e;font-size:12px}
.badge{padding:2px 8px;border-radius:12px;font-size:11px;font-weight:600}
.badge-buy{background:#0d2a1a;color:#4ade80}
.badge-sell{background:#2a0d0d;color:#f87171}
.badge-partial{background:#2a2200;color:#facc15}
.summary-bar{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:16px}
.summary-item{background:#0d0d15;border-radius:8px;padding:12px 16px;flex:1;min-width:140px;border:1px solid #1e1e2e}
.summary-val{font-size:22px;font-weight:600;margin-bottom:2px}
.summary-lbl{font-size:11px;color:#555}
.refresh-info{font-size:11px;color:#555;text-align:right;margin-bottom:8px}
.pulse{animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}
#detail-panel{display:none}
.tab-btns{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.tab-btn{padding:6px 14px;border-radius:20px;border:1px solid #333;background:#1a1a24;color:#888;cursor:pointer;font-size:12px}
.tab-btn.active{background:#1D9E75;color:#fff;border-color:#1D9E75}
</style>
</head>
<body>
<div class="top">
  <b>🤖 TradingIA — 6 Agents IA</b>
  <a href="/" class="nav-link">Dashboard</a>
  <a href="/agent" class="nav-link">Agent Global</a>
  <span id="refresh-countdown" style="margin-left:auto;font-size:12px;color:#555"></span>
  <button class="btn btn-green" onclick="runAll()">▶ Lancer tous</button>
  <button class="btn btn-gray" onclick="loadPnL()">🔄 Refresh P&L</button>
  <button class="btn btn-red" onclick="resetAll()">⚠ Reset tous</button>
</div>

<div class="content">
  <div id="global-summary" class="summary-bar">
    <div class="summary-item"><div class="summary-val" id="s-total">--</div><div class="summary-lbl">Valeur totale</div></div>
    <div class="summary-item"><div class="summary-val" id="s-invested">--</div><div class="summary-lbl">Capital investi</div></div>
    <div class="summary-item"><div class="summary-val" id="s-pnl">--</div><div class="summary-lbl">P&L global</div></div>
    <div class="summary-item"><div class="summary-val" id="s-positions">--</div><div class="summary-lbl">Positions ouvertes</div></div>
    <div class="summary-item"><div class="summary-val" id="s-trades">--</div><div class="summary-lbl">Trades total</div></div>
    <div class="summary-item"><div class="summary-val" id="s-winrate">--</div><div class="summary-lbl">Taux réussite</div></div>
  </div>

  <div class="refresh-info">Refresh automatique toutes les 15 min · <span class="pulse" id="live-dot" style="color:#1D9E75">●</span> Live</div>

  <div id="agents-grid" class="grid3"></div>

  <div id="detail-panel" class="card" style="margin-top:16px">
    <div class="tab-btns">
      <button class="tab-btn active" onclick="showDetailTab('positions')">Positions</button>
      <button class="tab-btn" onclick="showDetailTab('history')">Journal</button>
    </div>
    <div id="detail-positions"></div>
    <div id="detail-history" style="display:none"></div>
  </div>
</div>

<script>
const API = "https://tradingia2-production.up.railway.app";
let allData = {};
let selectedAgent = null;
let refreshTimer = null;
let countdownTimer = null;
let nextRefresh = Date.now() + 900000;

function n2(v,s){s=s||"";return v!=null?Number(v).toFixed(2)+s:"N/A";}
function n1(v,s){s=s||"";return v!=null?Number(v).toFixed(1)+s:"N/A";}
function fmt(v){return v!=null?Number(v).toLocaleString("fr-FR",{minimumFractionDigits:0,maximumFractionDigits:0}):"--";}
function sc(s){return s>=7?"#4ade80":s>=5?"#facc15":"#f87171";}
function pcolor(v){return v>=0?"#4ade80":"#f87171";}

function updateCountdown(){
  var left = Math.max(0, nextRefresh - Date.now());
  var min = Math.floor(left/60000);
  var sec = Math.floor((left%60000)/1000);
  document.getElementById("refresh-countdown").textContent = "Prochain refresh : " + min + "m " + (sec<10?"0":"") + sec + "s";
}

async function loadPnL(){
  try {
    var r = await fetch(API + "/api/agents/pnl_realtime");
    allData = await r.json();
    renderAll();
    nextRefresh = Date.now() + 900000;
  } catch(e) {
    console.error(e);
  }
}

function renderAll(){
  var agents = Object.values(allData);
  var totalVal = agents.reduce(function(s,a){return s+a.portfolio_value;},0);
  var totalInv = agents.reduce(function(s,a){return s+a.initial_capital;},0);
  var totalPnl = totalVal - totalInv;
  var totalPos = agents.reduce(function(s,a){return s+a.positions_count;},0);
  var totalTrades = agents.reduce(function(s,a){return s+a.total_trades;},0);
  var totalWins = agents.reduce(function(s,a){return s+a.winning_trades;},0);
  var wr = totalTrades>0?(totalWins/totalTrades*100):0;
  var pc = pcolor(totalPnl);

  document.getElementById("s-total").textContent = fmt(totalVal) + "EUR";
  document.getElementById("s-invested").textContent = fmt(totalInv) + "EUR";
  document.getElementById("s-pnl").innerHTML = "<span style='color:"+pc+"'>"+(totalPnl>=0?"+":"")+fmt(totalPnl)+"EUR ("+(totalPnl>=0?"+":"")+n1(totalPnl/totalInv*100)+"%) </span>";
  document.getElementById("s-positions").textContent = totalPos;
  document.getElementById("s-trades").textContent = totalTrades;
  document.getElementById("s-winrate").innerHTML = "<span style='color:"+(wr>=50?"#4ade80":"#f87171")+"'>"+wr.toFixed(0)+"%</span>";

  var grid = document.getElementById("agents-grid");
  grid.innerHTML = agents.map(function(a){
    var pc2 = pcolor(a.total_pnl);
    var wr2 = a.winrate;
    return "<div class='agent-card"+(selectedAgent===a.id?" selected":"")+"' onclick='selectAgent(\""+a.id+"\")'>" +
      "<div class='agent-header'>" +
        "<div><div class='agent-name'>"+a.emoji+" "+a.name+"</div><div class='agent-strategy'>Strategie: "+a.strategy+"</div></div>" +
        "<div style='text-align:right'><div class='agent-score' style='color:"+pc2+"'>"+(a.total_pnl>=0?"+":"")+n1(a.total_pnl_pct)+"%</div><div style='font-size:11px;color:#555'>P&L</div></div>" +
      "</div>" +
      "<div class='metric-row'><span class='label'>Valeur portfolio</span><span style='color:#fff;font-weight:500'>"+fmt(a.portfolio_value)+"EUR</span></div>" +
      "<div class='metric-row'><span class='label'>Capital dispo</span><span style='color:#aaa'>"+fmt(a.capital)+"EUR</span></div>" +
      "<div class='metric-row'><span class='label'>P&L total</span><span style='color:"+pc2+";font-weight:600'>"+(a.total_pnl>=0?"+":"")+fmt(a.total_pnl)+"EUR</span></div>" +
      "<div class='metric-row'><span class='label'>Positions</span><span style='color:#fff'>"+a.positions_count+"</span></div>" +
      "<div class='metric-row'><span class='label'>Trades aujourd hui</span><span style='color:#fff'>"+a.daily_buys+" achat(s) / "+a.daily_sells+" vente(s)</span></div>" +
      "<div class='metric-row'><span class='label'>Taux reussite</span><span style='color:"+(wr2>=50?"#4ade80":"#f87171")+"'>"+wr2+"%  ("+a.winning_trades+"/"+a.total_trades+")</span></div>" +
      "<div style='margin-top:10px;display:flex;gap:8px'>" +
        "<button class='btn btn-green' style='font-size:11px;padding:5px 10px' onclick='event.stopPropagation();runAgent(\""+a.id+"\")'> Lancer</button>" +
        "<button class='btn btn-red' style='font-size:11px;padding:5px 10px' onclick='event.stopPropagation();resetAgent(\""+a.id+"\")'> Reset</button>" +
      "</div>" +
    "</div>";
  }).join("");

  if(selectedAgent && allData[selectedAgent]){
    renderDetail(allData[selectedAgent]);
  }
}

function selectAgent(id){
  selectedAgent = id;
  document.querySelectorAll(".agent-card").forEach(function(c){c.classList.remove("selected");});
  document.querySelectorAll(".agent-card").forEach(function(c,i){
    if(Object.keys(allData)[i]===id) c.classList.add("selected");
  });
  document.getElementById("detail-panel").style.display = "block";
  renderDetail(allData[id]);
}

function showDetailTab(tab){
  document.querySelectorAll(".tab-btn").forEach(function(b){b.classList.remove("active");});
  event.target.classList.add("active");
  document.getElementById("detail-positions").style.display = tab==="positions"?"block":"none";
  document.getElementById("detail-history").style.display = tab==="history"?"block":"none";
}

function renderDetail(a){
  var positions = Object.entries(a.positions||{});
  if(!positions.length){
    document.getElementById("detail-positions").innerHTML = "<div style='color:#555;text-align:center;padding:20px'>Aucune position ouverte</div>";
  } else {
    document.getElementById("detail-positions").innerHTML =
      "<div class='pos-header'><span>Ticker</span><span>Nom</span><span>Px achat</span><span>Px actuel</span><span>Valeur</span><span>P&L</span></div>" +
      positions.map(function(e){
        var t=e[0], p=e[1];
        var pc3=pcolor(p.pnl);
        return "<div class='pos-row'>" +
          "<span style='font-weight:600;color:#1D9E75'>"+t+"</span>" +
          "<span style='color:#888;font-size:11px'>"+p.name+"</span>" +
          "<span style='color:#aaa'>" +n2(p.buy_price)+"</span>" +
          "<span style='color:#fff;font-weight:500'>"+n2(p.current_price)+"</span>" +
          "<span style='color:#fff'>"+fmt(p.value)+"</span>" +
          "<span style='color:"+pc3+";font-weight:600'>"+(p.pnl>=0?"+":"")+fmt(p.pnl)+" ("+(p.pnl_pct>=0?"+":"")+n1(p.pnl_pct)+"%)</span>" +
        "</div>";
      }).join("");
  }

  var history = (a.history||[]).slice(0,30);
  if(!history.length){
    document.getElementById("detail-history").innerHTML = "<div style='color:#555;text-align:center;padding:20px'>Aucune action</div>";
  } else {
    document.getElementById("detail-history").innerHTML =
      "<div class='hist-row' style='color:#555;font-size:11px'><span>Action</span><span>Ticker</span><span>Raison</span><span>Prix</span><span>P&L</span></div>" +
      history.map(function(h){
        var bc = h.type==="ACHAT"?"badge-buy":h.type==="VENTE"?"badge-sell":"badge-partial";
        var pnlHtml = h.pnl_abs!=null ? "<span style='color:"+pcolor(h.pnl_abs)+";font-weight:600'>"+(h.pnl_abs>=0?"+":"")+fmt(h.pnl_abs)+"</span>" : h.cost!=null ? "<span style='color:#888'>-"+fmt(h.cost)+"</span>" : "--";
        return "<div class='hist-row'>" +
          "<span class='badge "+bc+"'>"+h.type+"</span>" +
          "<span style='font-weight:600;color:#1D9E75'>"+h.ticker+"</span>" +
          "<span style='color:#666;font-size:11px'>"+( h.reason||"")+"</span>" +
          "<span style='color:#aaa'>"+n2(h.price)+"</span>" +
          pnlHtml +
        "</div>";
      }).join("");
  }
}

async function runAgent(id){
  document.querySelector(".agent-card.selected .agent-name") && (document.querySelector(".agent-card.selected .agent-name").textContent += " ...");
  try {
    await fetch(API + "/api/agents/"+id+"/run", {method:"POST"});
    await loadPnL();
  } catch(e) { alert("Erreur: "+e.message); }
}

async function runAll(){
  alert("Lancement de tous les agents... Cela peut prendre 5-10 minutes. La page se rafraichira automatiquement.");
  try {
    await fetch(API + "/api/agents/run_all", {method:"POST"});
    setTimeout(loadPnL, 10000);
  } catch(e) { alert("Erreur: "+e.message); }
}

async function resetAgent(id){
  if(!confirm("Reinitialiser l agent "+id+" a 20000 EUR ?")) return;
  await fetch(API + "/api/agents/"+id+"/reset?capital=20000", {method:"POST"});
  await loadPnL();
}

async function resetAll(){
  if(!confirm("Reinitialiser TOUS les agents a 20000 EUR ?")) return;
  await fetch(API + "/api/agents/reset_all?capital=20000", {method:"POST"});
  await loadPnL();
}

// Demarrage
loadPnL();
refreshTimer = setInterval(loadPnL, 900000);
countdownTimer = setInterval(updateCountdown, 1000);
</script>
</body>
</html>
